<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eswar & Geetha | Wedding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Montserrat:wght@200;400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0A0A0A;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        /* 3D Glass Effect */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Gold Gradient Text */
        .gold-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        /* Texture Overlay */
        .texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/black-paper.png');
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        .image-container {
            perspective: 1000px;
        }

        .image-3d {
            transform: rotateY(10deg) rotateX(5deg);
            transition: transform 0.5s;
        }
    </style>
</head>

<body>
    <div class="texture"></div>

    <main class="relative z-10">

        <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-10">
            <div class="image-container mb-8" id="hero-image">
             <div class="image-3d border-2 border-[#D4AF37] p-2 rounded-t-full overflow-hidden w-64 h-80 shadow-2xl">
    <img src="durga.jpg" class="w-full h-full object-cover" alt="Durga Matha">
</div>
            </div>

            <p class="uppercase tracking-[0.6em] text-[10px] mb-4 text-[#D4AF37] font-semibold">Divine Invitation</p>
            <h1 class="serif italic text-6xl text-center gold-text leading-tight mb-4">Eswar <br>& Geetha</h1>
            <div class="w-20 h-px bg-[#D4AF37] opacity-40"></div>
        </section>

        <section class="px-6 py-20 space-y-8">

            <div class="glass-card p-8 rounded-lg text-center reveal-up">
                <h3 class="uppercase tracking-widest text-xs text-[#D4AF37] mb-2">Pre-Wedding Lunch</h3>
                <div class="serif text-3xl mb-1">May 7th, 2026</div>
                <div class="text-xl font-light opacity-80">7:00 PM Onwards</div>
            </div>

            <div class="glass-card p-8 rounded-lg text-center border-[#D4AF37] border-2 bg-white/5 reveal-up">
                <h3 class="uppercase tracking-widest text-xs text-[#D4AF37] font-bold mb-2">Muhurtham</h3>
                <div class="serif text-4xl mb-1 gold-text">May 8th, 2026</div>
                <div class="text-2xl italic font-semibold">2:00 AM <span class="text-sm block opacity-60">Midnight
                        Ceremony</span></div>
            </div>

        </section>

        <section class="px-6 py-20 text-center bg-black/40">
            <h2 class="serif italic text-4xl mb-6 gold-text">The Venue</h2>
            <div class="space-y-2 mb-10">
                <p class="text-2xl font-semibold">Gunupudi Devalayam</p>
                <p class="text-sm opacity-60 tracking-widest uppercase">Bhimavaram, AP</p>
            </div>

            <a href="https://maps.google.com/?q=Gunupudi+Devalayam+Bhimavaram"
                class="inline-block px-12 py-4 border border-[#D4AF37] text-[#D4AF37] uppercase tracking-[0.3em] text-[10px] hover:bg-[#D4AF37] hover:text-black transition-all">
                Navigate to Venue
            </a>
        </section>

        <footer class="py-20 text-center opacity-40">
            <p class="serif italic text-xl">Bless the Couple</p>
        </footer>

    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 3D Tilt Effect for Hero Image
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * -20;
            gsap.to(".image-3d", { rotationY: x, rotationX: y, duration: 1 });
        });

        // Scroll Animations
        gsap.utils.toArray('.reveal-up').forEach(elem => {
            gsap.from(elem, {
                scrollTrigger: elem,
                y: 50,
                opacity: 0,
                duration: 1.2,
                ease: "power4.out"
            });
        });

        // Parallax for Background Image
        gsap.to(".image-3d", {
            scrollTrigger: {
                trigger: "#hero-image",
                start: "top top",
                scrub: true
            },
            y: 100,
            scale: 1.1
        });
    </script>
</body>

</html>
